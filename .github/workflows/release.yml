name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build & Release Matrix
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            goreleaser_config: .goreleaser.windows.yml

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Install Linux system dependencies for WebKit & GTK (Wails Cgo requirement)
      - name: Install Linux Dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libsoup-3.0-dev build-essential pkg-config libmpv-dev libasound2-dev

      # Install macOS dependencies
      - name: Install macOS Dependencies
        if: matrix.goos == 'darwin'
        run: |
          brew install create-dmg

      # Generate MSIX Assets
      - name: Generate MSIX Assets
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          go run build/windows/msix_assets.go

      # Wails requires the frontend dist folder to be present during go build
      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # Discard any modified files (e.g. package-lock.json modified by npm ci/install) so git is clean
      - name: Clean Git Workspace
        run: |
          git checkout -- .

      # Generate Windows resource files so that icons and product version metadata are embedded in the executable
      - name: Generate Windows Resources (syso)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          wails3 generate syso -arch amd64 -icon build/windows/icon.ico -manifest build/windows/wails.exe.manifest -info build/windows/info.json -out wails_windows_amd64.syso
          wails3 generate syso -arch arm64 -icon build/windows/icon.ico -manifest build/windows/wails.exe.manifest -info build/windows/info.json -out wails_windows_arm64.syso

      # Run GoReleaser to compile and package binaries and debian packages locally (without publish)
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=publish --config ${{ matrix.goreleaser_config }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

      # Custom packaging for Windows MSIX (x64 & ARM64)
      - name: Package Windows MSIX
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          if ($version -notmatch '^\d+\.\d+\.\d+\.\d+$') {
            if ($version -match '^\d+\.\d+\.\d+$') {
              $version = "$version.0"
            } else {
              $version = "1.0.2.0"
            }
          }
          
          # Find Windows SDK tools
          $sdkPath = Join-Path ${env:ProgramFiles(x86)} "Windows Kits\10\bin"
          $latestSdk = Get-ChildItem -Path $sdkPath | Where-Object { $_.Name -like "10.*" } | Sort-Object Name -Descending | Select-Object -First 1
          $makeappx = Join-Path $latestSdk.FullName "x64\makeappx.exe"
          $signtool = Join-Path $latestSdk.FullName "x64\signtool.exe"
          if (-not (Test-Path $makeappx)) {
            throw "makeappx.exe not found in Windows SDK path: $sdkPath"
          }
          
          # Extract libmpv-2.dll from version-controlled zip file
          if (Test-Path "build/windows/libmpv-2.dll.zip") {
            Write-Host "Extracting libmpv-2.dll..."
            Expand-Archive -Path "build/windows/libmpv-2.dll.zip" -DestinationPath "build/windows/" -Force
          }

          # Package x64 MSIX
          Write-Host "Preparing x64 MSIX layout..."
          $binDirAmd64 = @(Resolve-Path "dist/aura-windows_windows_amd64*")[0].Path
          $stageAmd64 = "dist/msix-x64"
          New-Item -ItemType Directory -Path $stageAmd64 -Force | Out-Null
          
          Copy-Item "$binDirAmd64\Aura-Music.exe" -Destination $stageAmd64 -Force
          if (Test-Path "build/windows/libmpv-2.dll") {
            Copy-Item "build/windows/libmpv-2.dll" -Destination $stageAmd64 -Force
          }
          Copy-Item -Path "build/windows/msix/Assets" -Destination $stageAmd64 -Recurse -Force
          
          # Update manifest version and architecture
          $manifest = [xml](Get-Content "build/windows/msix/app_manifest.xml")
          $manifest.Package.Identity.Version = $version
          $manifest.Package.Identity.ProcessorArchitecture = "x64"
          $manifest.Save("$stageAmd64/AppxManifest.xml")
          
          Write-Host "Packing x64 MSIX..."
          & $makeappx pack /d $stageAmd64 /p dist/Aura-Music-x64.msix
          
          # Package ARM64 MSIX
          Write-Host "Preparing ARM64 MSIX layout..."
          $binDirArm64 = @(Resolve-Path "dist/aura-windows_windows_arm64*")[0].Path
          $stageArm64 = "dist/msix-arm64"
          New-Item -ItemType Directory -Path $stageArm64 -Force | Out-Null
          
          Copy-Item "$binDirArm64\Aura-Music.exe" -Destination $stageArm64 -Force
          if (Test-Path "build/windows/libmpv-2.dll") {
            Copy-Item "build/windows/libmpv-2.dll" -Destination $stageArm64 -Force
          }
          Copy-Item -Path "build/windows/msix/Assets" -Destination $stageArm64 -Recurse -Force
          
          # Update manifest version and architecture
          $manifest = [xml](Get-Content "build/windows/msix/app_manifest.xml")
          $manifest.Package.Identity.Version = $version
          $manifest.Package.Identity.ProcessorArchitecture = "arm64"
          $manifest.Save("$stageArm64/AppxManifest.xml")
          
          Write-Host "Packing ARM64 MSIX..."
          & $makeappx pack /d $stageArm64 /p dist/Aura-Music-arm64.msix

          # Sign the MSIX packages
          Write-Host "Creating self-signed certificate for local validation..."
          $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=09B81860-F1BD-4EC7-A974-EFF28D07F2B4" -KeyUsage DigitalSignature -FriendlyName "Aura Music Cert" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
          $pwd = ConvertTo-SecureString "Aura123!" -AsPlainText -Force
          Export-PfxCertificate -Cert $cert -FilePath "dist/aura.pfx" -Password $pwd
          
          Write-Host "Signing x64 MSIX..."
          & $signtool sign /fd SHA256 /a /f "dist/aura.pfx" /p "Aura123!" "dist/Aura-Music-x64.msix"
          
          Write-Host "Signing ARM64 MSIX..."
          & $signtool sign /fd SHA256 /a /f "dist/aura.pfx" /p "Aura123!" "dist/Aura-Music-arm64.msix"

      # Custom packaging for macOS DMGs (AMD64 & ARM64)
      - name: Package macOS DMGs
        if: matrix.goos == 'darwin'
        run: |
          # Find compiled binary paths dynamically
          bin_amd64=$(ls -d dist/aura-macos_darwin_amd64*/Aura-Music | head -n 1)
          bin_arm64=$(ls -d dist/aura-macos_darwin_arm64*/Aura-Music | head -n 1)

          # Package AMD64
          mkdir -p dist/dmg-temp-amd64/Aura-Music.app/Contents/MacOS
          mkdir -p dist/dmg-temp-amd64/Aura-Music.app/Contents/Resources
          cp "$bin_amd64" dist/dmg-temp-amd64/Aura-Music.app/Contents/MacOS/
          cp build/darwin/Info.plist dist/dmg-temp-amd64/Aura-Music.app/Contents/
          cp build/darwin/icons.icns dist/dmg-temp-amd64/Aura-Music.app/Contents/Resources/
          echo -n "APPL????" > dist/dmg-temp-amd64/Aura-Music.app/Contents/PkgInfo
          
          create-dmg \
            --volname "Aura Music" \
            --volicon "build/darwin/icons.icns" \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Aura-Music.app" 175 120 \
            --app-drop-link 425 120 \
            "dist/Aura-macOS-amd64.dmg" \
            dist/dmg-temp-amd64/

          # Package ARM64
          mkdir -p dist/dmg-temp-arm64/Aura-Music.app/Contents/MacOS
          mkdir -p dist/dmg-temp-arm64/Aura-Music.app/Contents/Resources
          cp "$bin_arm64" dist/dmg-temp-arm64/Aura-Music.app/Contents/MacOS/
          cp build/darwin/Info.plist dist/dmg-temp-arm64/Aura-Music.app/Contents/
          cp build/darwin/icons.icns dist/dmg-temp-arm64/Aura-Music.app/Contents/Resources/
          echo -n "APPL????" > dist/dmg-temp-arm64/Aura-Music.app/Contents/PkgInfo
          
          create-dmg \
            --volname "Aura Music" \
            --volicon "build/darwin/icons.icns" \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Aura-Music.app" 175 120 \
            --app-drop-link 425 120 \
            "dist/Aura-macOS-arm64.dmg" \
            dist/dmg-temp-arm64/

      # Custom packaging for Linux AppImage (AMD64)
      - name: Package Linux AppImage
        if: matrix.goos == 'linux'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          
          mkdir -p dist/AppDir/usr/bin
          mkdir -p dist/AppDir/usr/share/applications
          mkdir -p dist/AppDir/usr/share/icons/hicolor/512x512/apps
          
          # Find compiled Linux binary path dynamically
          bin_linux=$(ls -d dist/aura-linux_linux_amd64*/Aura-Music | head -n 1)
          cp "$bin_linux" dist/AppDir/usr/bin/Aura-Music
          cp build/linux/org.wails.aura-music.desktop dist/AppDir/usr/share/applications/org.wails.aura-music.desktop
          cp build/appicon.png dist/AppDir/usr/share/icons/hicolor/512x512/apps/aura-music.png || true
          cp build/appicon.png dist/AppDir/usr/share/icons/hicolor/512x512/apps/org.wails.aura-music.png || true
          
          # Bundle libmpv dynamic libraries into the AppImage
          mkdir -p dist/AppDir/usr/lib
          cp -P /usr/lib/x86_64-linux-gnu/libmpv.so* dist/AppDir/usr/lib/
          
          ARCH=x86_64 ./linuxdeploy-x86_64.AppImage --appdir dist/AppDir --output appimage
          mv Aura*.AppImage dist/Aura-Linux-amd64.AppImage

      # Upload Packaged installers/bundles to GitHub Release
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.msix
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.zip
            dist/checksums.txt
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
