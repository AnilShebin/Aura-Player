name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build & Release Matrix
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            goos: linux
            goreleaser_config: .goreleaser.linux.yml
          - os: windows-latest
            goos: windows
            goreleaser_config: .goreleaser.windows.yml

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Install Linux system dependencies for WebKit & GTK (Wails Cgo requirement)
      - name: Install Linux Dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libsoup-3.0-dev build-essential pkg-config libmpv-dev libasound2-dev

      # Install macOS dependencies
      - name: Install macOS Dependencies
        if: matrix.goos == 'darwin'
        run: |
          brew install create-dmg

      # Install Windows NSIS (for setup installer packaging)
      - name: Setup Windows NSIS
        if: matrix.goos == 'windows'
        run: |
          choco install nsis -y

      # Wails requires the frontend dist folder to be present during go build
      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # Discard any modified files (e.g. package-lock.json modified by npm ci/install) so git is clean
      - name: Clean Git Workspace
        run: |
          git checkout -- .

      # Generate Windows resource files so that icons and product version metadata are embedded in the executable
      - name: Generate Windows Resources (syso)
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@latest
          wails3 generate syso -arch amd64 -icon build/windows/icon.ico -manifest build/windows/wails.exe.manifest -info build/windows/info.json -out wails_windows_amd64.syso
          wails3 generate syso -arch arm64 -icon build/windows/icon.ico -manifest build/windows/wails.exe.manifest -info build/windows/info.json -out wails_windows_arm64.syso

      # Run GoReleaser to compile and package binaries and debian packages locally (without publish)
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=publish --config ${{ matrix.goreleaser_config }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

      # Custom packaging for Windows installers (AMD64 & ARM64)
      - name: Package Windows Installers
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          
          # Find makensis executable path
          $makensis = "makensis"
          if (-not (Get-Command "makensis" -ErrorAction SilentlyContinue)) {
            $makensis = "C:\Program Files (x86)\NSIS\makensis.exe"
          }
          
          # Download WebView2 bootstrapper if needed
          if (Test-Path "build/windows/nsis/project.nsi") {
            $webView2Url = "https://go.microsoft.com/fwlink/p/?LinkId=2124703"
            $webView2Path = "build/windows/nsis/MicrosoftEdgeWebview2Setup.exe"
            if (-not (Test-Path $webView2Path)) {
              Write-Host "Downloading WebView2 Bootstrapper..."
              Invoke-WebRequest -Uri $webView2Url -OutFile $webView2Path
            }
          }
          
          # Extract libmpv-2.dll from version-controlled zip file
          $dllPath = ""
          if (Test-Path "build/windows/libmpv-2.dll.zip") {
            Write-Host "Extracting libmpv-2.dll..."
            Expand-Archive -Path "build/windows/libmpv-2.dll.zip" -DestinationPath "build/windows/" -Force
            $dllPath = @(Resolve-Path "build/windows/libmpv-2.dll")[0].Path
          }

          # Package AMD64
          $binDirAmd64 = @(Resolve-Path "dist/aura-windows_windows_amd64*")[0].Path
          $binAmd64Path = Join-Path $binDirAmd64 "Aura-Music.exe"
          if (Test-Path "build/windows/libmpv-2.dll") {
            Copy-Item "build/windows/libmpv-2.dll" -Destination $binDirAmd64 -Force
          }
          if (Test-Path "build/windows/nsis/project.nsi") {
            New-Item -ItemType Directory -Path "bin" -Force | Out-Null
            & $makensis /DVERSION=$version /DARG_WAILS_AMD64_BINARY="$binAmd64Path" /DARG_WAILS_DLL_PATH="$dllPath" build/windows/nsis/project.nsi
            Move-Item "bin/Aura-Music-amd64-installer.exe" "dist/Aura-Setup-Windows-x64.exe" -ErrorAction SilentlyContinue
          }
          Compress-Archive -Path "$binDirAmd64\*" -DestinationPath "dist/Aura-Setup-Windows-x64.zip" -Force

          # Package ARM64
          $binDirArm64 = @(Resolve-Path "dist/aura-windows_windows_arm64*")[0].Path
          $binArm64Path = Join-Path $binDirArm64 "Aura-Music.exe"
          if (Test-Path "build/windows/libmpv-2.dll") {
            Copy-Item "build/windows/libmpv-2.dll" -Destination $binDirArm64 -Force
          }
          if (Test-Path "build/windows/nsis/project.nsi") {
            New-Item -ItemType Directory -Path "bin" -Force | Out-Null
            & $makensis /DVERSION=$version /DARG_WAILS_ARM64_BINARY="$binArm64Path" /DARG_WAILS_DLL_PATH="$dllPath" build/windows/nsis/project.nsi
            Move-Item "bin/Aura-Music-arm64-installer.exe" "dist/Aura-Setup-Windows-arm64.exe" -ErrorAction SilentlyContinue
          }
          Compress-Archive -Path "$binDirArm64\*" -DestinationPath "dist/Aura-Setup-Windows-arm64.zip" -Force

      # Custom packaging for macOS DMGs (AMD64 & ARM64)
      - name: Package macOS DMGs
        if: matrix.goos == 'darwin'
        run: |
          # Find compiled binary paths dynamically
          bin_amd64=$(ls -d dist/aura-macos_darwin_amd64*/Aura-Music | head -n 1)
          bin_arm64=$(ls -d dist/aura-macos_darwin_arm64*/Aura-Music | head -n 1)

          # Package AMD64
          mkdir -p dist/dmg-temp-amd64/Aura-Music.app/Contents/MacOS
          mkdir -p dist/dmg-temp-amd64/Aura-Music.app/Contents/Resources
          cp "$bin_amd64" dist/dmg-temp-amd64/Aura-Music.app/Contents/MacOS/
          cp build/darwin/Info.plist dist/dmg-temp-amd64/Aura-Music.app/Contents/
          cp build/darwin/icons.icns dist/dmg-temp-amd64/Aura-Music.app/Contents/Resources/
          echo -n "APPL????" > dist/dmg-temp-amd64/Aura-Music.app/Contents/PkgInfo
          
          create-dmg \
            --volname "Aura Music" \
            --volicon "build/darwin/icons.icns" \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Aura-Music.app" 175 120 \
            --app-drop-link 425 120 \
            "dist/Aura-macOS-amd64.dmg" \
            dist/dmg-temp-amd64/

          # Package ARM64
          mkdir -p dist/dmg-temp-arm64/Aura-Music.app/Contents/MacOS
          mkdir -p dist/dmg-temp-arm64/Aura-Music.app/Contents/Resources
          cp "$bin_arm64" dist/dmg-temp-arm64/Aura-Music.app/Contents/MacOS/
          cp build/darwin/Info.plist dist/dmg-temp-arm64/Aura-Music.app/Contents/
          cp build/darwin/icons.icns dist/dmg-temp-arm64/Aura-Music.app/Contents/Resources/
          echo -n "APPL????" > dist/dmg-temp-arm64/Aura-Music.app/Contents/PkgInfo
          
          create-dmg \
            --volname "Aura Music" \
            --volicon "build/darwin/icons.icns" \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Aura-Music.app" 175 120 \
            --app-drop-link 425 120 \
            "dist/Aura-macOS-arm64.dmg" \
            dist/dmg-temp-arm64/

      # Custom packaging for Linux AppImage (AMD64)
      - name: Package Linux AppImage
        if: matrix.goos == 'linux'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          
          mkdir -p dist/AppDir/usr/bin
          mkdir -p dist/AppDir/usr/share/applications
          mkdir -p dist/AppDir/usr/share/icons/hicolor/512x512/apps
          
          # Find compiled Linux binary path dynamically
          bin_linux=$(ls -d dist/aura-linux_linux_amd64*/Aura-Music | head -n 1)
          cp "$bin_linux" dist/AppDir/usr/bin/Aura-Music
          cp build/linux/desktop dist/AppDir/usr/share/applications/aura-music.desktop
          cp build/appicon.png dist/AppDir/usr/share/icons/hicolor/512x512/apps/aura-music.png || true
          
          ARCH=x86_64 ./linuxdeploy-x86_64.AppImage --appdir dist/AppDir --output appimage
          mv Aura*.AppImage dist/Aura-Linux-amd64.AppImage

      # Upload Packaged installers/bundles to GitHub Release
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.zip
            dist/checksums.txt
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
